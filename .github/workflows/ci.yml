name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[all,dev]'

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Run tests
        run: pytest -q

      - name: Validate default Compose configuration
        run: docker compose config --quiet

      - name: Validate observability Compose configuration
        run: docker compose --profile observability config --quiet
